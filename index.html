<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Yönetim Paneli</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Login Ekranı */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 16px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; }

        /* Ana Uygulama */
        #app-container { display: none; width: 100%; height: 100%; flex-direction: row; }
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid #334155; padding: 25px; overflow-y: auto; box-sizing: border-box; }
        #main-view { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #020617; overflow: auto; padding: 20px; }
        
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; }
        .editor-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 15px; box-sizing: border-box; }

        #save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #save-btn:disabled { opacity: 0.5; }
        #status-bar { margin-top: 15px; text-align: center; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }

        svg { max-width: 100%; height: auto; background: white; display: block; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        @media (max-width: 800px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 45%; border-right: none; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>Sistem Girişi</h1>
        <input type="password" id="passInput" placeholder="Şifrenizi Girin">
        <button id="login-btn" onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="sidebar">
        <h2 style="margin-top:0; color:var(--accent);">EDİTÖR</h2>
        <div id="editor-fields">Yükleniyor...</div>
        <hr style="border:0; border-top:1px solid #334155; margin: 20px 0;">
        <button id="save-btn" onclick="saveData()">KAYDET</button>
        <div id="status-bar"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#475569; width:100%; margin-top:20px; text-decoration:underline; font-size:12px; cursor:pointer;">Çıkış Yap</button>
    </div>
    <div id="main-view"><div id="canvas-inner"></div></div>
</div>

<script>
    // --- AYAR: Cloudflare URL'nizi buraya yapıştırın ---
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    
    let SHA_KEY = "";
    let SESSION_PASS = "";

    async function login() {
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('login-btn');
        
        if(!pass) { alert("Şifre boş olamaz!"); return; }
        
        btn.innerText = "KONTROL EDİLİYOR...";
        btn.disabled = true;

        try {
            const res = await fetch(WORKER_URL, {
                headers: { "X-Auth-Key": pass }
            });

            if (res.status === 401) {
                alert("HATA: Şifre Yanlış!");
                btn.innerText = "GİRİŞ YAP";
                btn.disabled = false;
                return;
            }

            if (!res.ok) throw new Error("Sunucu hatası: " + res.status);

            const data = await res.json();
            SESSION_PASS = pass;
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";

            const svgContent = decodeURIComponent(escape(atob(data.content)));
            document.getElementById('canvas-inner').innerHTML = svgContent;
            renderFields();

        } catch (e) {
            alert("BAĞLANTI HATASI: " + e.message + "\nURL: " + WORKER_URL);
            btn.innerText = "GİRİŞ YAP";
            btn.disabled = false;
        }
    }

    function renderFields() {
        const container = document.getElementById('editor-fields');
        container.innerHTML = "";
        const targets = document.querySelectorAll('.duzenlenebilir');

        targets.forEach((el, i) => {
            const group = document.createElement('div');
            group.className = 'field-group';
            const label = document.createElement('label');
            
            // Türkçe büyük harf desteği
            let rawLabel = el.id ? el.id.replace(/_/g, ' ') : "ALAN " + (i + 1);
            label.innerText = rawLabel.toLocaleUpperCase('tr-TR');

            const input = document.createElement('input');
            input.className = "editor-input";
            input.value = el.textContent.trim();
            input.oninput = (e) => { el.textContent = e.target.value; };

            group.appendChild(label);
            group.appendChild(input);
            container.appendChild(group);
        });
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('status-bar');
        
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#334155";
        status.innerText = "KAYDEDİLİYOR...";

        try {
            const svg = document.querySelector('#canvas-inner svg');
            const svgText = new XMLSerializer().serializeToString(svg);
            const utf8 = new TextEncoder().encode(svgText);
            let binary = "";
            utf8.forEach(b => binary += String.fromCharCode(b));
            const base64 = btoa(binary);

            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Auth-Key": SESSION_PASS },
                body: JSON.stringify({
                    message: "Tablet Guncelleme",
                    content: base64,
                    sha: SHA_KEY
                })
            });

            const data = await res.json();
            if (res.ok) {
                SHA_KEY = data.content.sha;
                status.style.background = "#059669";
                status.innerText = "BAŞARIYLA KAYDEDİLDİ!";
                alert("Kayıt Başarılı!");
                setTimeout(() => { status.style.display = "none"; }, 3000);
            } else {
                alert("Kayıt Hatası: " + (data.error || data.message));
            }
        } catch (e) {
            alert("Sistem Hatası: " + e.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
