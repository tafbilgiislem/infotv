<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro SVG Editor | Multi-Device</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Giriş Ekranı */
        #login-screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; z-index: 9999; 
        }
        .login-card { background: var(--panel); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* Ana Uygulama Düzeni */
        #app-container { display: none; flex: 1; height: 100vh; overflow: hidden; }
        
        /* Responsive Layout: PC'de yan yana, Telefond/Tablette alt alta */
        @media (min-width: 1024px) {
            #app-container { flex-direction: row; }
            #sidebar { width: 350px; border-right: 1px solid var(--border); height: 100vh; }
            #main-view { flex: 1; height: 100vh; }
        }
        @media (max-width: 1023px) {
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; flex: 1; height: 50%; border-top: 1px solid var(--border); order: 2; }
            #main-view { width: 100%; height: 50%; order: 1; }
        }

        /* Sidebar İç Düzeni */
        #sidebar { display: flex; flex-direction: column; background: var(--panel); overflow: hidden; }
        
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 18px; color: var(--accent); letter-spacing: 1px; }

        /* Kaydırılabilir Düzenleme Alanı */
        #editor-fields { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: rgba(0,0,0,0.1);
        }

        /* Sabit Buton Paneli (Alt Kısım) */
        .sidebar-footer { 
            padding: 15px; border-top: 1px solid var(--border); 
            background: #111827; flex-shrink: 0;
        }

        /* Önizleme Alanı */
        #main-view { 
            background: #020617; display: flex; 
            align-items: center; justify-content: center; overflow: auto; padding: 10px;
        }

        /* Alan Kutuları */
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .field-label { display: block; font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }

        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .text-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; }
        
        /* Renk Seçici */
        .color-input {
            appearance: none; -webkit-appearance: none;
            width: 45px; height: 45px; border: 2px solid var(--border); 
            border-radius: 8px; cursor: pointer; background: none; padding: 0; flex-shrink: 0;
        }
        .color-input::-webkit-color-swatch { border: none; border-radius: 6px; }

        /* Slider */
        .range-container { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .range-info { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Butonlar */
        #save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        #save-btn:active { transform: scale(0.96); }
        #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status-bar { margin-top: 10px; text-align: center; font-size: 13px; font-weight: bold; display: none; padding: 8px; border-radius: 6px; }
        .exit-link { display: block; text-align: center; color: #475569; margin-top: 12px; font-size: 12px; text-decoration: underline; cursor: pointer; }

        /* SVG */
        #svg-wrapper { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); line-height: 0; }
        svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>Panel Girişi</h1>
        <input type="password" id="passInput" placeholder="Şifrenizi Girin">
        <button onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper"><div id="canvas-inner"></div></div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-header"><h2>DÜZENLEME PANELİ</h2></div>
        
        <div id="editor-fields">Yükleniyor...</div>
        
        <div class="sidebar-footer">
            <button id="save-btn" onclick="saveData()">KAYDET VE GÜNCELLE</button>
            <div id="status-bar"></div>
            <span class="exit-link" onclick="location.reload()">Güvenli Oturumu Kapat</span>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; // BURAYI GÜNCELLE
    let SHA_KEY = "";
    let SESSION_PASS = "";

    async function login() {
        const pass = document.getElementById('passInput').value;
        const btn = document.querySelector('.login-card button');
        btn.innerText = "Bağlanıyor...";
        
        try {
            const res = await fetch(WORKER_URL, { headers: { "X-Auth-Key": pass } });
            if (res.status === 401) { alert("Hatalı Şifre!"); btn.innerText = "GİRİŞ YAP"; return; }
            const data = await res.json();
            SESSION_PASS = pass;
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            renderFields();
        } catch (e) { alert("Sunucuya ulaşılamadı!"); btn.innerText = "GİRİŞ YAP"; }
    }

    function renderFields() {
        const container = document.getElementById('editor-fields');
        container.innerHTML = "";
        const targets = document.querySelectorAll('.duzenlenebilir');

        targets.forEach((el, i) => {
            const box = document.createElement('div');
            box.className = 'field-box';

            const label = document.createElement('label');
            label.className = 'field-label';
            label.innerText = (el.id ? el.id.replace(/_/g, ' ') : "ALAN " + (i + 1)).toLocaleUpperCase('tr-TR');
            box.appendChild(label);

            const row = document.createElement('div');
            row.className = 'input-row';

            const inp = document.createElement('input');
            inp.className = "text-input";
            inp.value = el.textContent.trim();
            inp.oninput = (e) => { el.textContent = e.target.value; };
            row.appendChild(inp);

            const cp = document.createElement('input');
            cp.type = "color";
            cp.className = "color-input";
            const currentColor = el.getAttribute('fill') || window.getComputedStyle(el).fill || "#000000";
            cp.value = rgbToHex(currentColor);
            cp.oninput = (e) => { el.setAttribute('fill', e.target.value); el.style.fill = e.target.value; };
            row.appendChild(cp);
            box.appendChild(row);

            const sDiv = document.createElement('div');
            sDiv.className = 'range-container';
            let curSize = parseInt(window.getComputedStyle(el).fontSize) || 20;
            sDiv.innerHTML = `
                <div class="range-info"><span>METİN BOYUTU</span><span id="v-${i}">${curSize}px</span></div>
                <input type="range" min="8" max="200" value="${curSize}" oninput="updateSize(this, ${i})">
            `;
            box.appendChild(sDiv);
            container.appendChild(box);
        });
    }

    window.updateSize = (slider, idx) => {
        const el = document.querySelectorAll('.duzenlenebilir')[idx];
        el.style.fontSize = slider.value + "px";
        document.getElementById(`v-${idx}`).innerText = slider.value + "px";
    };

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const parts = rgb.match(/\d+/g);
        if (!parts) return "#000000";
        return "#" + parts.map(x => parseInt(x).toString(16).padStart(2, '0')).join('').substring(0, 6);
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const st = document.getElementById('status-bar');
        btn.disabled = true;
        st.style.display = "block"; st.style.background = "#1e293b"; st.style.color = "#94a3b8"; st.innerText = "GÖNDERİLİYOR...";

        try {
            const svg = document.querySelector('#canvas-inner svg');
            const svgText = new XMLSerializer().serializeToString(svg);
            const encoded = btoa(unescape(encodeURIComponent(svgText)));

            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Auth-Key": SESSION_PASS },
                body: JSON.stringify({ message: "Multi-Device Update", content: encoded, sha: SHA_KEY })
            });

            if (res.ok) {
                const data = await res.json();
                SHA_KEY = data.content.sha;
                st.style.background = "#065f46"; st.style.color = "#fff"; st.innerText = "BAŞARIYLA KAYDEDİLDİ";
                setTimeout(() => st.style.display = "none", 3000);
            } else { alert("Kayıt başarısız!"); st.style.display = "none"; }
        } catch (e) { alert("Hata!"); }
        btn.disabled = false;
    }
</script>
</body>
</html>
