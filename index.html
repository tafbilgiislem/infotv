<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cloudflare Güvenli SVG Editör</title>
    <style>
        /* Önceki stillerle aynı */
        body { display: flex; margin: 0; font-family: sans-serif; height: 100vh; background: #1a1a1b; color: white; }
        #editor-panel { width: 350px; background: #272729; padding: 20px; border-right: 1px solid #343435; overflow-y: auto; }
        #preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #0f0f0f; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; background: #1a1a1b; border: 1px solid #343435; color: #d7dadc; }
        #save-btn { width: 100%; padding: 12px; background: #d93a00; color: white; border: none; cursor: pointer; font-weight: bold; }
        svg { background: white; max-width: 95%; height: auto; }
    </style>
</head>
<body>

<div id="editor-panel">
    <h3>Güvenli Editör</h3>
    <div id="controls">Yükleniyor...</div>
    <button id="save-btn" onclick="save()">GitHub'a Kaydet</button>
    <div id="status"></div>
</div>

<div id="preview-area">
    <div id="canvas"></div>
</div>

<script>
    // Cloudflare Worker'ın yayınlandığı URL'yi buraya yapıştır
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    let currentSha = "";

    async function load() {
    const controls = document.getElementById('controls');
    try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();

        currentSha = data.sha;
        const svgContent = decodeURIComponent(escape(atob(data.content)));
        document.getElementById('canvas').innerHTML = svgContent;
        
        controls.innerHTML = ""; 

        // KRİTİK DEĞİŞİKLİK BURADA: 
        // Sadece class'ı "duzenlenebilir" olanları bulur
        const targets = document.querySelectorAll('.duzenlenebilir');

        targets.forEach((el, i) => {
            const div = document.createElement('div');
            div.style.marginBottom = "15px";
            
            const label = document.createElement('label');
            // Eğer elementin bir ID'si varsa ismini oradan al, yoksa numara ver
            label.innerText = el.id ? el.id : "Metin Alanı " + (i + 1);
            label.style.display = "block";
            label.style.fontSize = "12px";
            label.style.color = "#888";

            const inp = document.createElement('input');
            inp.value = el.textContent.trim();
            inp.style.width = "100%";
            inp.style.padding = "8px";
            inp.style.marginTop = "5px";
            
            inp.oninput = (e) => { 
                el.textContent = e.target.value; 
            };

            div.appendChild(label);
            div.appendChild(inp);
            controls.appendChild(div);
        });

        if (targets.length === 0) {
            controls.innerHTML = "<p style='color:orange'>Düzenlenebilir alan bulunamadı. SVG'deki metinlere class='duzenlenebilir' eklediğinizden emin olun.</p>";
        }

    } catch (err) {
        controls.innerHTML = "<b style='color:red'>Bağlantı Hatası:</b> " + err.message;
    }
}

    load();
</script>
</body>
</html>
