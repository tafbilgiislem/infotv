<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dinamik SVG Sunumu</title>
</head>
<body>
    <div id="svg-container"></div>

    <script>
        async function loadAndModifySVG() {
            const url = 'https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg';
            
            try {
                const response = await fetch(url);
                let svgText = await response.text();

                // SVG'yi ekrana bas
                const container = document.getElementById('svg-container');
                container.innerHTML = svgText;

                // Değişiklik Yapma Kısmı
                // Örn: SVG içinde id="baslik" olan bir text alanını değiştirme
                const svgElement = container.querySelector('svg');
                const titleElement = svgElement.getElementById('baslik');
                
                if (titleElement) {
                    titleElement.textContent = "Yeni Dinamik Başlık";
                    titleElement.style.fill = "red"; // Rengini değiştirme
                }

            } catch (error) {
                console.error("SVG yüklenirken hata oluştu:", error);
            }
        }

        loadAndModifySVG();
    </script>
</body>
</html>
