<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Editor | Fixed Interface</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Giriş Ekranı */
        #login-screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        .login-card { background: var(--panel); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; text-align: center; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* Ana Düzen */
        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: row; overflow: hidden; }

        /* Sol/Alt Panel (Editor) */
        #sidebar { 
            display: flex; flex-direction: column; background: var(--panel); 
            width: 350px; border-right: 1px solid var(--border); flex-shrink: 0; height: 100%;
        }

        /* Sağ/Üst Alan (SVG Önizleme) */
        #main-view { 
            flex: 1; background: #020617; display: flex; 
            align-items: center; justify-content: center; overflow: auto; padding: 10px;
        }

        /* Sidebar Header */
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.2); }
        .sidebar-header h2 { margin: 0; font-size: 16px; text-align: center; color: var(--accent); letter-spacing: 1px; }

        /* KAYDIRILABİLİR ORTA ALAN */
        #editor-fields { 
            flex: 1; overflow-y: auto; padding: 15px; 
            /* Dokunmatik kaydırma iyileştirmesi */
            -webkit-overflow-scrolling: touch;
        }

        /* SABİT ALT BUTONLAR (Asla Kaybolmaz) */
        .sidebar-footer { 
            padding: 15px; border-top: 1px solid var(--border); 
            background: #111827; flex-shrink: 0; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* Alan Kutuları */
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .field-label { display: block; font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }

        .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .text-input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 15px; }
        
        .color-input {
            appearance: none; -webkit-appearance: none; width: 44px; height: 44px; 
            border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: none; flex-shrink: 0; padding: 0;
        }
        .color-input::-webkit-color-swatch { border: none; border-radius: 4px; }

        .range-box { background: #000; padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
        input[type=range] { width: 100%; accent-color: var(--accent); margin: 5px 0; cursor: pointer; }

        /* Butonlar */
        #save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #save-btn:active { opacity: 0.8; transform: scale(0.98); }
        #save-btn:disabled { background: #475569; cursor: not-allowed; }
        
        #status-bar { margin: 10px 0; text-align: center; font-size: 12px; font-weight: bold; display: none; padding: 8px; border-radius: 5px; }
        .exit-link { display: block; text-align: center; color: #64748b; margin-top: 10px; font-size: 12px; text-decoration: underline; cursor: pointer; }

        /* TABLET & TELEFON UYUMU */
        @media (max-width: 1023px) {
            #app-container { flex-direction: column; }
            #main-view { height: 45vh; flex: none; }
            #sidebar { width: 100%; flex: 1; border-right: none; border-top: 1px solid var(--border); height: 55vh; }
        }

        #svg-wrapper { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); line-height: 0; }
        svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>Giriş</h1>
        <input type="password" id="passInput" placeholder="Şifre">
        <button onclick="login()">EDİTÖRÜ AÇ</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper"><div id="canvas-inner"></div></div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-header"><h2>DÜZENLEME PANELİ</h2></div>
        
        <div id="editor-fields">Yükleniyor...</div>
        
        <div class="sidebar-footer">
            <button id="save-btn" onclick="saveData()">DEĞİŞİKLİKLERİ KAYDET</button>
            <div id="status-bar"></div>
            <span class="exit-link" onclick="location.reload()">Güvenli Çıkış</span>
        </div>
    </div>
</div>

<script>
    // URL'nizi buraya yazın
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    
    let SHA_KEY = "";
    let SESSION_PASS = "";

    async function login() {
        const pass = document.getElementById('passInput').value;
        try {
            const res = await fetch(WORKER_URL, { headers: { "X-Auth-Key": pass } });
            if (res.status === 401) { alert("Şifre Yanlış!"); return; }
            const data = await res.json();
            SESSION_PASS = pass;
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            renderFields();
        } catch (e) { alert("Hata!"); }
    }

    function renderFields() {
        const container = document.getElementById('editor-fields');
        container.innerHTML = "";
        const targets = document.querySelectorAll('.duzenlenebilir');

        targets.forEach((el, i) => {
            const box = document.createElement('div');
            box.className = 'field-box';

            const label = document.createElement('label');
            label.className = 'field-label';
            label.innerText = (el.id ? el.id.replace(/_/g, ' ') : "ALAN " + (i + 1)).toLocaleUpperCase('tr-TR');
            box.appendChild(label);

            const row = document.createElement('div');
            row.className = 'input-row';

            const inp = document.createElement('input');
            inp.className = "text-input";
            inp.value = el.textContent.trim();
            inp.oninput = (e) => { el.textContent = e.target.value; };
            row.appendChild(inp);

            const cp = document.createElement('input');
            cp.type = "color";
            cp.className = "color-input";
            const currentColor = el.getAttribute('fill') || window.getComputedStyle(el).fill || "#000000";
            cp.value = rgbToHex(currentColor);
            cp.oninput = (e) => { el.setAttribute('fill', e.target.value); el.style.fill = e.target.value; };
            row.appendChild(cp);
            box.appendChild(row);

            const rBox = document.createElement('div');
            rBox.className = 'range-box';
            let curSize = parseInt(window.getComputedStyle(el).fontSize) || 20;
            rBox.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:10px; color:#888;">
                    <span>YAZI BOYUTU</span><span id="v-${i}">${curSize}px</span>
                </div>
                <input type="range" min="8" max="200" value="${curSize}" oninput="updateSize(this, ${i})">
            `;
            box.appendChild(rBox);
            container.appendChild(box);
        });
    }
