<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SVG Slayt Editörü - Güvenli Kayıt</title>
    <style>
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; background: #1a1a1b; color: white; }
        
        /* Editör Paneli */
        #editor-panel { 
            width: 350px; background: #272729; padding: 25px; 
            border-right: 1px solid #343435; overflow-y: auto; display: flex; flex-direction: column;
        }
        
        /* Önizleme Alanı */
        #preview-area { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            background: #0f0f0f; padding: 20px;
        }

        h3 { color: #d7dadc; border-bottom: 1px solid #343435; padding-bottom: 10px; margin-top: 0; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #818384; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input { 
            width: 100%; padding: 10px; background: #1a1a1b; border: 1px solid #343435; 
            color: #d7dadc; border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }
        input:focus { border-color: #0079d3; outline: none; }

        /* Buton ve Durum Mesajları */
        #save-btn { 
            width: 100%; padding: 15px; background: #d93a00; color: white; border: none; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;
        }
        #save-btn:hover { background: #ff4500; }
        #save-btn:disabled { background: #4d4d4d; cursor: not-allowed; }

        #status { 
            margin-top: 20px; padding: 10px; border-radius: 4px; text-align: center; 
            font-size: 14px; font-weight: 500; display: none; /* Başlangıçta gizli */
        }

        svg { background: white; max-width: 95%; height: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="editor-panel">
    <h3>Dinamik Alanlar</h3>
    <div id="controls">Yükleniyor...</div>
    
    <hr style="border: 0; border-top: 1px solid #343435; margin: 20px 0;">
    
    <button id="save-btn" onclick="save()">DEĞİŞİKLİKLERİ KAYDET</button>
    <div id="status"></div>
</div>

<div id="preview-area">
    <div id="canvas"></div>
</div>

<script>
    // Cloudflare Worker URL'nizi buraya yapıştırın
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    let currentSha = "";

    async function load() {
        const controls = document.getElementById('controls');
        const status = document.getElementById('status');
        
        try {
            const res = await fetch(WORKER_URL);
            const data = await res.json();

            if (data.message === "Bad credentials") {
                controls.innerHTML = "<b style='color:#ff4500'>Hata: Token Geçersiz!</b>";
                return;
            }

            currentSha = data.sha;
            
            // SVG'yi ekrana bas
            const svgContent = decodeURIComponent(escape(atob(data.content)));
            document.getElementById('canvas').innerHTML = svgContent;
            
            // Sadece .duzenlenebilir sınıfına sahip olanları çek
            const targets = document.querySelectorAll('.duzenlenebilir');
            controls.innerHTML = ""; 

            targets.forEach((el, i) => {
                const div = document.createElement('div');
                div.className = 'input-group';
                
                const label = document.createElement('label');
                // ID varsa ID'yi, yoksa "Alan X" yaz
                label.innerText = el.id ? el.id.replace(/_/g, ' ') : "Alan " + (i + 1);
                
                const inp = document.createElement('input');
                inp.type = "text";
                inp.value = el.textContent.trim();
                
                inp.oninput = (e) => { 
                    el.textContent = e.target.value; 
                };

                div.appendChild(label);
                div.appendChild(inp);
                controls.appendChild(div);
            });

            if (targets.length === 0) {
                controls.innerHTML = "<p style='color:#edbc4a; font-size:13px;'>Düzenlenebilir alan bulunamadı. <br>SVG'ye class='duzenlenebilir' ekleyin.</p>";
            }

        } catch (err) {
            controls.innerHTML = "<b style='color:#ff4500'>Bağlantı Hatası:</b> " + err.message;
        }
    }

    async function save() {
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        
        // Geri bildirim başlat
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#343435";
        status.style.color = "#d7dadc";
        status.innerText = "Kaydediliyor... Lütfen bekleyin.";

        try {
            const svgCode = document.getElementById('canvas').innerHTML;
            const encoded = btoa(unescape(encodeURIComponent(svgCode)));

            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Web Editor: Dinamik alanlar güncellendi",
                    content: encoded,
                    sha: currentSha
                })
            });

            if (res.ok) {
                const data = await res.json();
                currentSha = data.content.sha; // Yeni SHA'yı güncelle (tekrar kaydetmek için şart)
                
                status.style.background = "#27ae60";
                status.style.color = "white";
                status.innerText = "Kalıcı olarak kaydedildi!";
                
                // 3 saniye sonra mesajı gizle
                setTimeout(() => { status.style.display = "none"; }, 3000);
            } else {
                throw new Error("Kayıt sırasında sunucu hatası oluştu.");
            }
        } catch (err) {
            status.style.background = "#ff4500";
            status.style.color = "white";
            status.innerText = "Hata: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }

    // İlk yükleme
    load();
</script>
</body>
</html>
