<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Giriş Ekranı */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; text-align: center; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* Ana Arayüz */
        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        
        /* Sidebar Yapısı */
        #sidebar { 
            display: flex; flex-direction: column; background: var(--panel); 
            width: 350px; border-right: 1px solid var(--border); flex-shrink: 0; 
        }

        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 10px; }

        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sidebar-header h2 { margin: 0; font-size: 16px; text-align: center; color: var(--accent); }

        /* Kaydırılabilir Düzenleme Alanı */
        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }

        /* ÇİVİLENMİŞ ALT BUTONLAR */
        .sidebar-footer { 
            padding: 15px; border-top: 1px solid var(--border); 
            background: #111827; flex-shrink: 0; 
        }

        /* Form Elemanları */
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .text-input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 16px; }
        
        .color-input {
            appearance: none; -webkit-appearance: none; width: 44px; height: 44px; 
            border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: none; padding: 0;
        }
        .color-input::-webkit-color-swatch { border: none; border-radius: 4px; }

        .range-box { background: #000; padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Kaydet & Çıkış */
        #save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #save-btn:disabled { background: #475569; opacity: 0.6; }
        .exit-link { display: block; text-align: center; color: #64748b; margin-top: 12px; font-size: 12px; text-decoration: underline; cursor: pointer; }

        /* Responsive Düzen (Telefon/Tablet Dikey) */
        @media (max-width: 1023px) {
            #app-container { flex-direction: column; }
            #main-view { height: 40vh; flex: none; }
            #sidebar { width: 100%; flex: 1; border-right: none; border-top: 1px solid var(--border); height: 60vh; }
        }

        #svg-wrapper { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); line-height: 0; }
        svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>Giriş</h1>
        <input type="password" id="passInput" placeholder="Şifrenizi Yazın">
        <button onclick="login()">EDİTÖRÜ AÇ</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper"><div id="canvas-inner"></div></div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-header"><h2>DÜZENLEME PANELİ</h2></div>
        <div id="editor-fields">Yükleniyor...</div>
        <div class="sidebar-footer">
            <button id="save-btn" onclick="saveData()">DEĞİŞİKLİKLERİ KAYDET</button>
            <div id="status-info" style="display:none; text-align:center; margin-top:10px; font-size:12px; font-weight:bold;"></div>
            <span class="exit-link" onclick="location.reload()">Güvenli Çıkış</span>
        </div>
    </div>
</div>

<script>
    // --- KRİTİK AYAR: Kendi Worker URL'nizi buraya yapıştırın ---
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    
    let SHA_KEY = "";
    let SESSION_PASS = "";

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        const btn = document.querySelector('.login-card button');

        if(!pass) { alert("Lütfen şifre girin!"); return; }
        btn.innerText = "BAĞLANILIYOR...";
        btn.disabled = true;

        try {
            const res = await fetch(WORKER_URL, {
                method: "GET",
                headers: { "X-Auth-Key": pass }
            });

            if (res.status === 401) {
                alert("❌ ŞİFRE HATALI!");
                btn.innerText = "TEKRAR DENE";
                btn.disabled = false;
                return;
            }

            if (!res.ok) throw new Error("Sunucu Hatası: " + res.status);

            const data = await res.json();
            SESSION_PASS = pass;
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            renderFields();

        } catch (e) {
            alert("🚨 BAĞLANTI HATASI!\n\nLinkin doğruluğundan ve internetten emin olun.\n\nHata: " + e.message);
            btn.innerText = "GİRİŞ YAP";
            btn.disabled = false;
        }
    }

    function renderFields() {
        const container = document.getElementById('editor-fields');
        container.innerHTML = "";
        const targets = document.querySelectorAll('.duzenlenebilir');

        targets.forEach((el, i) => {
            const box = document.createElement('div');
            box.className = 'field-box';

            const label = document.createElement('div');
            label.style.cssText = "font-size:11px; color:#94a3b8; font-weight:bold; margin-bottom:8px;";
            label.innerText = (el.id ? el.id.replace(/_/g, ' ') : "ALAN " + (i + 1)).toLocaleUpperCase('tr-TR');
            box.appendChild(label);

            const row = document.createElement('div');
            row.className = 'input-row';

            const inp = document.createElement('input');
            inp.className = "text-input";
            inp.value = el.textContent.trim();
            inp.oninput = (e) => { el.textContent = e.target.value; };
            row.appendChild(inp);

            const cp = document.createElement('input');
            cp.type = "color";
            cp.className = "color-input";
            const currentColor = el.getAttribute('fill') || window.getComputedStyle(el).fill || "#000000";
            cp.value = rgbToHex(currentColor);
            cp.oninput = (e) => { el.setAttribute('fill', e.target.value); el.style.fill = e.target.value; };
            row.appendChild(cp);
            box.appendChild(row);

            const rBox = document.createElement('div');
            rBox.className = 'range-box';
            let curSize = parseInt(window.getComputedStyle(el).fontSize) || 20;
            rBox.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:10px; color:#888;">
                    <span>BOYUT</span><span id="v-${i}">${curSize}px</span>
                </div>
                <input type="range" min="8" max="200" value="${curSize}" oninput="updateSize(this, ${i})">
            `;
            box.appendChild(rBox);
            container.appendChild(box);
        });
    }

    window.updateSize = (slider, idx) => {
        const el = document.querySelectorAll('.duzenlenebilir')[idx];
        el.style.fontSize = slider.value + "px";
        document.getElementById(`v-${idx}`).innerText = slider.value + "px";
    };

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const parts = rgb.match(/\d+/g);
        if (!parts) return "#000000";
        return "#" + parts.map(x => parseInt(x).toString(16).padStart(2, '0')).join('').substring(0, 6);
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const st = document.getElementById('status-info');
        btn.disabled = true;
        st.style.display = "block"; st.style.color = "#94a3b8"; st.innerText = "GÖNDERİLİYOR...";

        try {
            const svg = document.querySelector('#canvas-inner svg');
            const svgText = new XMLSerializer().serializeToString(svg);
            const encoded = btoa(unescape(encodeURIComponent(svgText)));

            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Auth-Key": SESSION_PASS },
                body: JSON.stringify({ message: "Update", content: encoded, sha: SHA_KEY })
            });

            if (res.ok) {
                const data = await res.json();
                SHA_KEY = data.content.sha;
                st.style.color = "#10b981"; st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
                setTimeout(() => { st.style.display = "none"; }, 3000);
            } else {
                alert("❌ KAYIT HATASI!");
                st.style.display = "none";
            }
        } catch (e) { alert("Sistem Hatası: " + e.message); }
        btn.disabled = false;
    }
</script>
</body>
</html>
