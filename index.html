<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Slayt Editörü - Tablet Uyumlu</title>
    <style>
        :root { --accent: #ff4500; --bg: #121212; --panel: #1e1e1e; }
        body { display: flex; flex-direction: column; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; background: var(--bg); color: white; overflow: hidden; }
        
        /* Tablet için Alt-Üst veya Yan Düzen (Ekran Genişliğine Göre) */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            #editor-panel { width: 350px; border-right: 1px solid #333; height: 100vh; }
        }

        #editor-panel { 
            background: var(--panel); padding: 20px; overflow-y: auto; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 10;
        }
        
        #preview-area { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            background: #000; overflow: auto; padding: 10px; position: relative;
        }

        h3 { color: var(--accent); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.2rem; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; 
            color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 16px; /* Tablette zoom yapmaması için 16px */
        }

        #save-btn { 
            width: 100%; padding: 16px; background: var(--accent); color: white; border: none; 
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #save-btn:active { transform: scale(0.98); background: #cc3700; }
        #save-btn:disabled { background: #444; color: #888; }

        #status { 
            margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; 
            font-size: 14px; display: none; font-weight: bold;
        }

        #svg-wrapper { background: white; line-height: 0; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="editor-panel">
    <h3>Slayt Editörü</h3>
    <div id="controls">Veriler çekiliyor...</div>
    
    <div style="margin-top: 20px;">
        <button id="save-btn" onclick="save()">DEĞİŞİKLİKLERİ KAYDET</button>
        <div id="status"></div>
    </div>
</div>

<div id="preview-area">
    <div id="svg-wrapper">
        <div id="canvas"></div>
    </div>
</div>

<script>
    // BULUT ADRESİNİZİ BURAYA YAZIN
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; 
    let currentSha = "";

    async function load() {
        const controls = document.getElementById('controls');
        const status = document.getElementById('status');
        
        try {
            const res = await fetch(WORKER_URL);
            const data = await res.json();

            if (data.message === "Bad credentials") {
                alert("Hata: GitHub Token geçersiz. Cloudflare Worker ayarlarını kontrol edin.");
                controls.innerHTML = "Bağlantı Hatası.";
                return;
            }

            currentSha = data.sha;
            
            // Base64 SVG'yi tablet dostu decode et
            const svgContent = decodeURIComponent(escape(atob(data.content)));
            document.getElementById('canvas').innerHTML = svgContent;
            
            // Sadece .duzenlenebilir sınıfını bul
            const targets = document.querySelectorAll('.duzenlenebilir');
            controls.innerHTML = ""; 

            if (targets.length === 0) {
                controls.innerHTML = "<p style='color:#edbc4a;'>Düzenlenebilir alan (.duzenlenebilir) bulunamadı.</p>";
                return;
            }

            targets.forEach((el, i) => {
                const div = document.createElement('div');
                div.className = 'input-group';
                
                const label = document.createElement('label');
                label.innerText = el.id ? el.id.replace(/_/g, ' ') : "Metin " + (i + 1);
                
                const inp = document.createElement('input');
                inp.type = "text";
                inp.value = el.textContent.trim();
                
                // Anlık önizleme
                inp.oninput = (e) => { 
                    el.textContent = e.target.value; 
                };

                div.appendChild(label);
                div.appendChild(inp);
                controls.appendChild(div);
            });

        } catch (err) {
            alert("Yükleme Hatası: " + err.message);
            controls.innerHTML = "Hata oluştu.";
        }
    }

    async function save() {
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#333";
        status.style.color = "#fff";
        status.innerText = "Kaydediliyor...";

        try {
            const svgElement = document.querySelector('#canvas svg');
            if (!svgElement) throw new Error("SVG bulunamadı.");

            // Tablet/Chrome uyumlu metne çevirme
            const serializer = new XMLSerializer();
            const svgCode = serializer.serializeToString(svgElement);
            
            // UTF-8 uyumlu Base64 (Android için en güvenli yol)
            const utf8Bytes = new TextEncoder().encode(svgCode);
            let binary = "";
            utf8Bytes.forEach(b => binary += String.fromCharCode(b));
            const encoded = btoa(binary);

            const response = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Tablet Editör Güncellemesi",
                    content: encoded,
                    sha: currentSha
                })
            });

            const data = await response.json();

            if (response.ok) {
                currentSha = data.content.sha; // SHA güncelle
                status.style.background = "#27ae60";
                status.innerText = "BAŞARIYLA KAYDEDİLDİ!";
                alert("Kayıt Başarılı! Değişiklikler GitHub'a iletildi.");
                setTimeout(() => { status.style.display = "none"; }, 3000);
            } else {
                const msg = data.message || "GitHub bir hata döndürdü.";
                alert("Kayıt Hatası: " + msg);
                status.style.background = "#ff4500";
                status.innerText = "Hata Oluştu!";
            }
        } catch (err) {
            alert("İşlem Hatası: " + err.toString());
            status.style.background = "#ff4500";
            status.innerText = "Bağlantı Hatası!";
        } finally {
            btn.disabled = false;
        }
    }

    // Başlat
    load();
</script>
</body>
</html>
