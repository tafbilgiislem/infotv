<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Editör | Güvenli Giriş</title>
    <style>
        :root { --accent: #ff4500; --bg: #121212; --panel: #1e1e1e; --input-bg: #000; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Giriş Ekranı Stili */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }
        .login-box {
            background: var(--panel); padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 350px; text-align: center;
        }
        .login-box h2 { color: var(--accent); margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: var(--input-bg);
            border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px;
        }

        /* Editör Arayüzü (Başlangıçta Gizli) */
        #main-container { display: none; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 768px) { #main-container { flex-direction: column; } }

        #editor-panel { width: 350px; background: var(--panel); padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        @media (max-width: 768px) { #editor-panel { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid #333; } }

        #preview-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; overflow: auto; padding: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .editor-input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 16px; }

        #save-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #save-btn:disabled { background: #444; }

        #status { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; display: none; }
        #svg-wrapper { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        svg { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>Panel Girişi</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="checkLogin()">GİRİŞ YAP</button>
        <p id="login-error" style="color: #ff4500; font-size: 13px; margin-top: 10px; display: none;">Hatalı giriş!</p>
    </div>
</div>

<div id="main-container">
    <div id="editor-panel">
        <h3 style="color: var(--accent); margin-top: 0;">Slayt Editörü</h3>
        <div id="controls">Yükleniyor...</div>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <button id="save-btn" onclick="save()">DEĞİŞİKLİKLERİ KAYDET</button>
        <div id="status"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#555; width:100%; margin-top:20px; cursor:pointer; font-size:12px;">Güvenli Çıkış</button>
    </div>

    <div id="preview-area">
        <div id="svg-wrapper">
            <div id="canvas"></div>
        </div>
    </div>
</div>

<script>
    // AYARLAR
    const LOGIN_CONFIG = {
        user: "admin",      // Kullanıcı adınız
        pass: "12345"       // Şifreniz (Burayı mutlaka değiştirin)
    };

    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; // Cloudflare linkiniz
    let currentSha = "";

    // 1. GİRİŞ KONTROLÜ
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('login-error');

        if(u === LOGIN_CONFIG.user && p === LOGIN_CONFIG.pass) {
            document.getElementById('login-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('main-container').style.display = "flex";
                load(); // Giriş başarılıysa verileri çek
            }, 500);
        } else {
            err.style.display = "block";
            setTimeout(() => { err.style.display = "none"; }, 2000);
        }
    }

    // 2. VERİ ÇEKME
    async function load() {
        const controls = document.getElementById('controls');
        try {
            const res = await fetch(WORKER_URL);
            const data = await res.json();

            if (data.message === "Bad credentials") {
                alert("GitHub Hatası: Token geçersiz!");
                return;
            }

            currentSha = data.sha;
            const svgContent = decodeURIComponent(escape(atob(data.content)));
            document.getElementById('canvas').innerHTML = svgContent;
            
            const targets = document.querySelectorAll('.duzenlenebilir');
            controls.innerHTML = ""; 

            targets.forEach((el, i) => {
                const div = document.createElement('div');
                div.className = 'input-group';
                const label = document.createElement('label');
                label.innerText = el.id ? el.id.replace(/_/g, ' ') : "Alan " + (i + 1);
                const inp = document.createElement('input');
                inp.className = "editor-input";
                inp.value = el.textContent.trim();
                inp.oninput = (e) => { el.textContent = e.target.value; };
                div.appendChild(label);
                div.appendChild(inp);
                controls.appendChild(div);
            });
        } catch (err) {
            alert("Yükleme Hatası: " + err.message);
        }
    }

    // 3. KAYDETME
    async function save() {
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#333";
        status.innerText = "Kaydediliyor...";

        try {
            const svgElement = document.querySelector('#canvas svg');
            const serializer = new XMLSerializer();
            const svgCode = serializer.serializeToString(svgElement);
            
            const utf8Bytes = new TextEncoder().encode(svgCode);
            let binary = "";
            utf8Bytes.forEach(b => binary += String.fromCharCode(b));
            const encoded = btoa(binary);

            const response = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Tablet Guncellemesi",
                    content: encoded,
                    sha: currentSha
                })
            });

            const data = await response.json();

            if (response.ok) {
                currentSha = data.content.sha;
                status.style.background = "#27ae60";
                status.innerText = "KAYDEDİLDİ!";
                alert("Başarıyla kaydedildi!");
                setTimeout(() => { status.style.display = "none"; }, 3000);
            } else {
                alert("Kayıt Hatası: " + data.message);
                status.style.background = "#ff4500";
                status.innerText = "Hata!";
            }
        } catch (err) {
            alert("Sistem Hatası: " + err.toString());
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
